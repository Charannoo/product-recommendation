<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - SmartShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #111;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: #0066c0;
        }

        a:hover {
            color: #c45500;
            text-decoration: underline;
        }

        .auth-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            flex-grow: 1;
        }

        .form-box {
            width: 350px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            background: #fff;
            margin-bottom: 20px;
        }

        .form-box h2 {
            font-size: 28px;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .form-box input[type="text"],
        .form-box input[type="email"],
        .form-box input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #a6a6a6;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .form-box input:focus {
            border-color: #e77600;
            outline: none;
            box-shadow: 0 0 3px rgba(228, 121, 17, .5);
        }

        .auth-button {
            width: 100%;
            background: #ffd814;
            border-color: #fcd200;
            border-style: solid;
            border-width: 1px;
            border-radius: 8px;
            color: #111;
            padding: 8px;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(213, 217, 217, .5);
        }

        .auth-button:hover {
            background: #f7ca00;
            border-color: #f2c200;
        }

        /* Footer */
        .auth-footer {
            margin-top: 20px;
            padding: 30px;
            text-align: center;
            background: linear-gradient(to bottom, #fbfbfb, #fbfbfb);
            border-top: 1px solid #e7e7e7;
            font-size: 11px;
            color: #555;
            width: 100%;
            box-sizing: border-box;
        }

        .auth-footer a {
            margin: 0 10px;
        }

        .auth-footer .copyright {
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        {% block content %}
        {% endblock %}
    </div>

    <div class="auth-footer">
        <div>
            <a href="#">Conditions of Use</a>
            <a href="#">Privacy Notice</a>
            <a href="#">Help</a>
        </div>
        <div class="copyright">
            © 2026 SmartShop | Powered by Group-3
        </div>
    </div>
</body>

</html>

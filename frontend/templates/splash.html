<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - SmartShop</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #a56df9 0%, #ffcda5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .splash-container:hover {
            transform: scale(1.05);
        }

        .splash-image {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        /* Loading pulse animation */
        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(220, 165, 165, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(220, 165, 165, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(220, 165, 165, 0);
            }
        }

        .pulse-effect {
            animation: pulse 2s infinite;
            border-radius: 50%;
            display: inline-block;
        }

        p {
            margin-top: 30px;
            color: #8a7373;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <a href="/dashboard" style="text-decoration: none;">
        <div class="splash-container">
            <div class="pulse-effect">
                <img src="{{ url_for('static', filename='splash_icon.png') }}" alt="Enter SmartShop"
                    class="splash-image">
            </div>
            <p>Click to Enter</p>
        </div>
    </a>
</body>

</html>
